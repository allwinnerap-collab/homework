<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/normalize.css">
</head>
<body>
    <form class="form">
        <fieldset class="form-group">
            <legend class="form-group-title">Ваши личные даннные</legend>
            <label class="label">
            <span class="name">Ваше имя</span>
                <input type="text" placeholder="Имя" class="input">
            <span class="age">Ваш возраст</span>
                <input type="number" placeholder="Возраст" inputmode="numeric" class="input" required> 
            <span class="tel">Ваш номер телефона</span>
                <input type="tel"  placeholder="Ваш телефон" inputmode="tel" class="input" required>
            <span class="email">Ваша почта</span>
                <input type="email"  placeholder="почта" inputmode="email" class="input" required>
            <span class="message">Сообщение</span>
                <textarea name="message" class="textarea" placeholder="Ваше сообщение"></textarea>
            </label>

        </fieldset>
        <fieldset class="form-group">  
            <label class="label checkbox-label">
                <span class="checkbox-text"></span>
                <input class="checkbox" type="checkbox">Я принимаю правила
            </label>
        </fieldset>
        <button class="button">Отправить</button>
    </form>
</body>
</html>
